name: API - Code Coverage

on:
  push:
    paths:
      - 'api/**'
  pull_request:
    branches:
      - main

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  coverage:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./api

    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: npm install

      - name: Run Tests
        uses: ArtiomTr/jest-coverage-report-action@v2
        with:
          working-directory: ./api
          threshold: 85
